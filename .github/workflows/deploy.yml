name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # Acessa a pasta do site na VPS
            cd /sites/punisherbrasil.com.br
            
            # Puxa a versão mais recente do código
            git pull origin main
            
            # Reconstrói e reinicia os containers do Docker
            docker compose down
            docker compose up -d --build
