name: Deploy to VPS

# Trigger deploy test
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # Acessa a pasta do site na VPS
            cd /sites/punisherbrasil.com.br
            
            # Puxa a versão mais recente do código
            git pull origin main
            
            # Reconstrói e reinicia os containers do Docker (suporta v1 e v2)
            if docker compose version >/dev/null 2>&1; then
              DOCKER_CMD="sudo docker compose"
            else
              DOCKER_CMD="sudo docker-compose"
            fi
            
            $DOCKER_CMD down
            $DOCKER_CMD up -d --build
            
            # Aguarda 5 segundos e mostra o status e logs para diagnóstico no GitHub Actions
            sleep 5
            $DOCKER_CMD ps
            $DOCKER_CMD logs --tail=50 web


